<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" fill="none" role="img" aria-label="Premium car">
  <defs>
    <linearGradient id="paint0" x1="96" y1="70" x2="882" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFEFE"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="paint1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 160) rotate(25) scale(520 260)">
      <stop stop-color="#590425" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#590425" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paint2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 120) rotate(20) scale(420 220)">
      <stop stop-color="#101828" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#101828" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20" y="-20" width="1020" height="600" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Subtle premium background -->
  <rect x="40" y="40" width="900" height="480" rx="28" fill="url(#paint0)"/>
  <rect x="40" y="40" width="900" height="480" rx="28" fill="url(#paint1)"/>
  <rect x="40" y="40" width="900" height="480" rx="28" fill="url(#paint2)"/>
  <rect x="40" y="40" width="900" height="480" rx="28" stroke="#101828" stroke-opacity="0.08"/>

  <!-- Car silhouette (minimal) -->
  <g filter="url(#shadow)">
    <path d="M176 328c16-44 44-82 86-116 32-26 76-42 142-50 44-5 118-6 214 0 62 4 114 18 154 44 34 22 60 52 78 90 18 6 30 22 30 40v42c0 20-16 36-36 36H812c-8 0-14-6-14-14v-8H382v8c0 8-6 14-14 14H190c-20 0-36-16-36-36v-44c0-18 10-34 22-38z"
      fill="#FFFFFF"/>
    <path d="M176 328c16-44 44-82 86-116 32-26 76-42 142-50 44-5 118-6 214 0 62 4 114 18 154 44 34 22 60 52 78 90 18 6 30 22 30 40v42c0 20-16 36-36 36H812c-8 0-14-6-14-14v-8H382v8c0 8-6 14-14 14H190c-20 0-36-16-36-36v-44c0-18 10-34 22-38z"
      stroke="#101828" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Window line -->
    <path d="M308 282c30-34 82-54 156-60 66-6 132-6 198 0 50 4 92 18 124 42 10 8 18 18 24 28H308z"
      fill="#FBFEFE" stroke="#101828" stroke-opacity="0.10" stroke-width="2"/>

    <!-- Accent line -->
    <path d="M214 340h552" stroke="#590425" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>

    <!-- Wheels -->
    <g>
      <circle cx="322" cy="412" r="54" fill="#101828" fill-opacity="0.90"/>
      <circle cx="322" cy="412" r="32" fill="#FFFFFF"/>
      <circle cx="322" cy="412" r="10" fill="#590425"/>
    </g>
    <g>
      <circle cx="728" cy="412" r="54" fill="#101828" fill-opacity="0.90"/>
      <circle cx="728" cy="412" r="32" fill="#FFFFFF"/>
      <circle cx="728" cy="412" r="10" fill="#590425"/>
    </g>
  </g>

  <!-- Minimal ground shadow -->
  <ellipse cx="520" cy="478" rx="320" ry="26" fill="#101828" fill-opacity="0.08"/>
</svg>
